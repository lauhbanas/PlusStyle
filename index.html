!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PlusStyle</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #f5f5f5;
}

header {
  background: #ff4d88;
  color: white;
  padding: 15px;
  text-align: center;
}

.container {
  padding: 15px;
}

.card {
  background: white;
  border-radius: 15px;
  padding: 15px;
  margin-bottom: 15px;
}

.card img {
  width: 100%;
  border-radius: 10px;
  height: 230px;
  object-fit: cover;
}

button {
  width: 100%;
  padding: 10px;
  background: #ff4d88;
  color: white;
  border: none;
  border-radius: 10px;
}

nav {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: white;
  display: flex;
  justify-content: space-around;
  padding: 10px;
}

.hidden {
  display: none;
}
</style>
</head>

<body>

<header>
  <h2>PlusStyle 💖</h2>
</header>

<div id="home" class="container">

  <div class="card">
    <img src="https://images.unsplash.com/photo-1520975916090-3105956dac38">
    <h3>Você linda do seu jeito 💖</h3>
  </div>

  <div class="card">
    <img src="https://images.unsplash.com/photo-1618354691373-d851c5c3a990">
    <h3>Vestido Preto Elegante</h3>
    <button onclick="addCarrinho('Vestido Preto')">Adicionar ao carrinho</button>
  </div>

  <div class="card">
    <img src="https://images.unsplash.com/photo-1583001809873-a128495da465">
    <h3>Conjunto Pantalona</h3>
    <button onclick="addCarrinho('Conjunto Pantalona')">Adicionar ao carrinho</button>
  </div>

</div>

<div id="produtos" class="container hidden">

  <div class="card">
    <img src="https://images.unsplash.com/photo-1593032465175-481ac7f401a0">
    <h3>Blusa Assimétrica</h3>
    <button onclick="addCarrinho('Blusa')">Adicionar</button>
  </div>

  <div class="card">
    <img src="https://images.unsplash.com/photo-1603252109303-2751441dd157">
    <h3>Conjunto Lilás</h3>
    <button onclick="addCarrinho('Conjunto Lilás')">Adicionar</button>
  </div>

</div>

<div id="carrinho" class="container hidden">
  <h3>Seu Carrinho 🛒</h3>
  <ul id="lista"></ul>
  <button onclick="finalizar()">Finalizar compra</button>
</div>

<div id="perfil" class="container hidden">
  <h3>Minha Conta 👤</h3>
  <p>Login fictício</p>
</div>

<nav>
  <button onclick="trocar('home')">🏠</button>
  <button onclick="trocar('produtos')">👗</button>
  <button onclick="trocar('carrinho')">🛒</button>
  <button onclick="trocar('perfil')">👤</button>
</nav>

<script>
let carrinho = [];

function trocar(tela) {
  document.getElementById('home').classList.add('hidden');
  document.getElementById('produtos').classList.add('hidden');
  document.getElementById('carrinho').classList.add('hidden');
  document.getElementById('perfil').classList.add('hidden');

  document.getElementById(tela).classList.remove('hidden');
}

function addCarrinho(produto) {
  carrinho.push(produto);
  atualizar();
  alert("Adicionado ao carrinho 💖");
}

function atualizar() {
  let lista = document.getElementById('lista');
  lista.innerHTML = "";
  carrinho.forEach(item => {
    let li = document.createElement('li');
    li.textContent = item;
    lista.appendChild(li);
  });
}

function finalizar() {
  alert("Compra finalizada 💖 (simulação)");
}
</script>

</body>
</html>
